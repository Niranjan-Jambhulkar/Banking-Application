<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="Source/css/BankingApplication.css">
</head>
<body class="background-signup">
    <h1 class="signup-Heading">Banking Application</h1>
    
    <Form action="SignUp" method="post" class="container-signup row">
        <p class="signup-text">Create Account</p>
        <label for="fname" class="form-label signup-label row col-6">First Name</label>
        <input type="text" name="fname" id="" class="form-control signup-input col-6" placeholder="First Name" required>

        <label for="lname" class="form-label signup-label row col-6">Last Name</label>
        <input type="text" name="lname" id="" class="form-control signup-input col-6" placeholder="Last Name">

        <label for="email" class="form-label signup-label row col-6">E-Mail</label>
        <input type="email" name="email" id="" class="form-control signup-input col-6" placeholder="E-mail ID" required>

        <label for="user" name="user" class="form-label signup-label row col-6">User Name</label>
        <input type="text" name="user" id="" class="form-control signup-input col-6" placeholder="Create User Name" required>

        <label for="password" class="form-label signup-label row col-6" name="password">Password</label>
        <input type="password" name="password" id="" class="form-control signup-input col-6" placeholder="Create Password" required>
        <button class="login-btn">Create Account</button>
    </Form>
    
</body>
</html>
