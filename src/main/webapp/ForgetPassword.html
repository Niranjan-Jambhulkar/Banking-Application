<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/BankingApplication.css">
</head>
<body class="background-reset">
    <h1 class="login-Heading">Banking Application</h1>
    <form action="" class="container-reset row">
        <p class="reset-text">Reset Password</p>
        <label for="email" class="form-label reset-label row col-12">Enter your Register E-mail ID</label>
        <input type="email" name="email" id="" class="form-control reset-input col-12" placeholder="E-mail ID" required>
        <button class="login-btn reset-btn">Reset</button>
    </form>
</body>
</html>
